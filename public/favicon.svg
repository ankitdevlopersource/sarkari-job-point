    <line x1="182" y1="95" x2="118" y2="105"/>
    <line x1="182" y1="105" x2="118" y2="95"/>
    <line x1="177" y1="68" x2="123" y2="132"/>
    <line x1="177" y1="132" x2="123" y2="68"/>
    <line x1="169" y1="63" x2="131" y2="137"/>

    <line x1="188" y1="100" x2="112" y2="100"/>
    <line x1="175" y1="75" x2="125" y2="125"/>
    <line x1="175" y1="125" x2="125" y2="75"/>
    <line x1="180" y1="85" x2="120" y2="115"/>
